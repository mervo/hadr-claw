# Canonical runtime. `claw` is one run of the report pipeline; `dashboard`
# serves the result. The working copy is bind-mounted so state/, run records
# and dashboard.html land in the repo (the claw's memory lives in git).
services:
  claw:
    build: .
    env_file:
      - path: .env
        required: false   # Tier 1–3 need no secrets; the agent tiers do
    volumes:
      - ./:/app

  dashboard:
    image: python:3.12-slim
    volumes:
      - ./:/app:ro
    working_dir: /app
    command: ["python", "-m", "http.server", "8080"]
    ports:
      - "8080:8080"
