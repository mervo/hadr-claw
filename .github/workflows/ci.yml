# Keyless CI: tests replay recorded transcripts (HADR_FAKE_MODEL), feeds come
# from fixtures — no secrets, so PRs from anywhere pass safely.
name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest -q
      - run: uv run python scripts/check_dedup.py
      - run: uv run python scripts/check_memory.py
      - name: pipeline run on fixtures + dashboard check
        run: |
          uv run python -m hadr --fixtures tests/fixtures \
            --out ci_dashboard.html --state /tmp/ci_state/seen.json
          uv run python scripts/check_dashboard.py ci_dashboard.html /tmp/ci_state/seen.json
      - run: uv run python scripts/check_spend.py
